<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maadhur</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --deep-void: #0A0B0E;
    --surface: #131316;
    --border: #1A1A1E;
    --text: #F0F0F5;
    --muted: #8A8B96;
    --pink: #FF4D8B;
    --blue: #00D4FF;
    --violet: #8B5CF6;
    --green: #22C55E;
    --orange: #F59E0B;
    --red: #EF4444;
    --cyan: #06B6D4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--deep-void);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ===== ANIMATED BG ===== */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
    animation: float 15s ease-in-out infinite;
  }
  .bg-orb-1 { width: 300px; height: 300px; background: var(--pink); top: -5%; left: -10%; }
  .bg-orb-2 { width: 250px; height: 250px; background: var(--blue); top: 30%; right: -15%; animation-delay: -5s; animation-duration: 18s; }
  .bg-orb-3 { width: 200px; height: 200px; background: var(--violet); bottom: 5%; left: 10%; animation-delay: -10s; animation-duration: 16s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -20px) scale(1.08); }
    66% { transform: translate(-15px, 15px) scale(0.95); }
  }

  /* ===== HEADER ===== */
  .header {
    padding: 16px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  .brand {
    font-weight: 800; font-size: 18px;
    background: linear-gradient(135deg, var(--text) 60%, var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-tag {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600;
  }

  /* ===== HERO COMPACT ===== */
  .hero {
    padding: 8px 20px 16px;
    text-align: center;
    z-index: 10;
  }
  .hero-title {
    font-weight: 900;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 1.1;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--text) 50%, var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-desc {
    color: var(--muted); font-size: 13px;
    line-height: 1.5; max-width: 320px;
    margin: 0 auto 16px;
  }

  /* ===== SUBJECTS GRID ===== */
  .subjects-section {
    flex: 1;
    padding: 0 16px 20px;
    overflow-y: auto;
    z-index: 10;
    scrollbar-width: none;
  }
  .subjects-section::-webkit-scrollbar { display: none; }

  .section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
    padding-left: 4px;
  }

  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .subject-card {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 12px; border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .subject-card:active { transform: scale(0.97); }
  .subject-card:hover {
    border-color: var(--glow);
    box-shadow: 0 4px 20px var(--glow-shadow);
  }
  .subject-circle {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .subject-circle svg { width: 20px; height: 20px; color: white; }
  .subject-info h3 {
    font-weight: 700; font-size: 13px;
    color: var(--text); margin-bottom: 2px;
  }
  .subject-info p {
    font-size: 10px; color: var(--muted);
    line-height: 1.3;
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 24px;
    background: rgba(10,11,14,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.05);
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    color: var(--muted); text-decoration: none;
    font-size: 10px; font-weight: 500;
    transition: color 0.3s ease;
    padding: 4px 12px;
  }
  .nav-item.active, .nav-item:hover { color: var(--pink); }
  .nav-item svg { width: 22px; height: 22px; }

  /* Animations */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .anim-in {
    animation: slideUp 0.5s ease-out both;
  }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
</style>
<base target="_blank">
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="app">

  <!-- Header -->
  <div class="header anim-in">
    <div>
      <div class="brand">Maadhur</div>
      <div class="header-tag">UPSC Prep Hub</div>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero anim-in delay-1">
    <h1 class="hero-title">Maadhur</h1>
    <p class="hero-desc">Your comprehensive UPSC preparation companion. All subjects, progress tracking & resources in one place.</p>
  </div>

  <!-- Subjects -->
  <div class="subjects-section anim-in delay-2" id="subjects">
    <div class="section-label">All Subjects</div>
    <div class="subjects-grid" id="subjectsGrid"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav anim-in delay-3">
    <a href="#subjects" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      Subjects
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Tracker
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Notes
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </nav>

</div>

<script>
const subjects = [
  { name: 'Geography', desc: 'Physical, Human & Indian', gradient: 'linear-gradient(135deg,#00D4FF,#33DFFF)', glow: 'rgba(0,212,255,0.4)', glowShadow: 'rgba(0,212,255,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>' },
  { name: 'History', desc: 'Ancient, Medieval & Modern', gradient: 'linear-gradient(135deg,#FF4D8B,#FF6B9F)', glow: 'rgba(255,77,139,0.4)', glowShadow: 'rgba(255,77,139,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>' },
  { name: 'Polity', desc: 'Constitution & Governance', gradient: 'linear-gradient(135deg,#8B5CF6,#A78BFA)', glow: 'rgba(139,92,246,0.4)', glowShadow: 'rgba(139,92,246,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 9v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9m16-5H4a2 2 0 0 0-2 2v1a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><path d="M10 2v4m4-4v4"/></svg>' },
  { name: 'Economics', desc: 'Indian Economy & Development', gradient: 'linear-gradient(135deg,#22C55E,#4ADE80)', glow: 'rgba(34,197,94,0.4)', glowShadow: 'rgba(34,197,94,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>' },
  { name: 'Science & Tech', desc: 'General Science & Tech', gradient: 'linear-gradient(135deg,#00D4FF,#33DFFF)', glow: 'rgba(0,212,255,0.4)', glowShadow: 'rgba(0,212,255,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5z"/><path d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.04-2.04-7.36-.02-11.9 4.5"/></svg>' },
  { name: 'Ethics', desc: 'Integrity & Aptitude', gradient: 'linear-gradient(135deg,#22C55E,#4ADE80)', glow: 'rgba(34,197,94,0.4)', glowShadow: 'rgba(34,197,94,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' },
  { name: 'Essay', desc: 'Essay Writing Practice', gradient: 'linear-gradient(135deg,#F59E0B,#FBBF24)', glow: 'rgba(245,158,11,0.4)', glowShadow: 'rgba(245,158,11,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>' },
  { name: 'Sociology', desc: 'Social Structure & Change', gradient: 'linear-gradient(135deg,#8B5CF6,#A78BFA)', glow: 'rgba(139,92,246,0.4)', glowShadow: 'rgba(139,92,246,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' },
  { name: 'Academic Writing', desc: 'Writing Skills & Techniques', gradient: 'linear-gradient(135deg,#06B6D4,#22D3EE)', glow: 'rgba(6,182,212,0.4)', glowShadow: 'rgba(6,182,212,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' },
  { name: 'Computer', desc: 'Basics & Applications', gradient: 'linear-gradient(135deg,#EF4444,#F87171)', glow: 'rgba(239,68,68,0.4)', glowShadow: 'rgba(239,68,68,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>' },
  { name: 'Assamese', desc: 'Language & Literature', gradient: 'linear-gradient(135deg,#FF4D8B,#FF6B9F)', glow: 'rgba(255,77,139,0.4)', glowShadow: 'rgba(255,77,139,0.15)', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' },
];

const grid = document.getElementById('subjectsGrid');
subjects.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'subject-card';
  card.style.setProperty('--glow', s.glow);
  card.style.setProperty('--glow-shadow', s.glowShadow);
  card.style.animation = `slideUp 0.4s ease-out ${0.3 + i * 0.04}s both`;
  card.innerHTML = `
    <div class="subject-circle" style="background:${s.gradient};">${s.icon}</div>
    <div class="subject-info">
      <h3>${s.name}</h3>
      <p>${s.desc}</p>
    </div>
  `;
  grid.appendChild(card);
});

// Bottom nav active state
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function(e) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>

</body>
</html>
